<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <img src="https://assets.hackclub.com/flag-orpheus-top.svg" alt="Hack Club">

    <div class="container">
        <h1>Pomodoro Timer</h1>

        <div class="row">
            <label>Work (min):</label>
            <input type="number" id="workTime" value="25" min="1">
        </div>

        <div class="row">
            <label>Break (min):</label>
            <input type="number" id="breakTime" value="5" min="1">
        </div>

        <h2 id="timer">25:00</h2>

        <div class="buttons">
            <button onclick="startTimer()">Start</button>
            <button onclick="pauseTimer()">Pause</button>
            <button onclick="resetTimer()">Reset</button>
        </div>

        <p id="mode">Mode: Work</p>
        <p id="sessions">Sessions: 0</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
